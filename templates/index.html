<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI-Sopos</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div id="loading-overlay">
    <div class="loading-content">
      <p>Sto scrivendo la tua fiaba…</p>
      <div class="loading-bar-track">
        <div class="loading-bar"></div>
      </div>
    </div>
  </div>

  <div class="container">
    <header>
      <h1>AI-Sopos</h1>
      <p class="subtitle">Generatore di Fiabe</p>
    </header>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <section class="form-section">
      <form id="genera-form" action="/genera" method="post">
        <fieldset>
          <legend>Tema</legend>
          {% for key, desc in themes.items() %}
          <label>
            <input type="radio" name="tema" value="{{ key }}"
              {% if form.get('tema') == key %}checked{% endif %}>
            {{ key|capitalize }} — <small>{{ desc }}</small>
          </label>
          {% endfor %}
          <label>
            <input type="radio" name="tema" value="random"
              {% if not form.get('tema') or form.get('tema') == 'random' %}checked{% endif %}>
            Casuale
          </label>
        </fieldset>

        <div class="field">
          <label for="lunghezza">Lunghezza</label>
          <select name="lunghezza" id="lunghezza">
            {% for l in lengths %}
            <option value="{{ l }}" {% if form.get('lunghezza', 'media') == l %}selected{% endif %}>
              {{ l|capitalize }}
            </option>
            {% endfor %}
          </select>
        </div>

        <div class="field">
          <label for="parole_chiave">Parole chiave <small>(opzionale)</small></label>
          <input type="text" name="parole_chiave" id="parole_chiave"
            placeholder="es. mare, conchiglia, amicizia"
            value="{{ form.get('parole_chiave', '') }}">
        </div>

        <div class="form-actions">
          <button type="submit" id="btn-genera">Genera</button>
          <a href="/cronologia" class="link-cronologia">Storico fiabe</a>
        </div>
      </form>
    </section>
  </div>

  <script>
    document.getElementById('genera-form').addEventListener('submit', function (e) {
      e.preventDefault();
      document.getElementById('btn-genera').disabled = true;
      document.getElementById('loading-overlay').style.display = 'flex';
      this.submit();
    });
  </script>
</body>
</html>
