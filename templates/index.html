<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI-Sopos</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div id="loading-overlay">
    <div class="loading-content">
      <p>Sto scrivendo la tua fiaba…</p>
      <div class="loading-bar-track">
        <div class="loading-bar"></div>
      </div>
    </div>
  </div>

  <div class="container">
    <header>
      <h1>AI-Sopos</h1>
      <p class="subtitle">Generatore di Fiabe</p>
    </header>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <section class="form-section">
      <form id="genera-form" action="/genera" method="post">
        <fieldset>
          <legend>Tema</legend>
          {% for key, theme in themes.items() %}
          <label>
            <input type="radio" name="tema" value="{{ key }}"
              {% if form.get('tema') == key %}checked{% endif %}>
            {{ theme.label }} — <small>{{ theme.prompt }}</small>
          </label>
          {% endfor %}
          <label>
            <input type="radio" name="tema" value="random"
              {% if not form.get('tema') or form.get('tema') == 'random' %}checked{% endif %}>
            Casuale
          </label>
        </fieldset>

        <div class="field">
          <label for="lunghezza">Lunghezza</label>
          <select name="lunghezza" id="lunghezza">
            {% for l in lengths %}
            <option value="{{ l }}" {% if form.get('lunghezza', default_length) == l %}selected{% endif %}>
              {{ l|capitalize }}
            </option>
            {% endfor %}
          </select>
        </div>

        <div class="field">
          <label>Parole chiave <small>(opzionale)</small></label>
          <input type="hidden" name="parole_chiave_json" id="parole_chiave_json"
            value="{{ form.get('parole_chiave_json', '[]') }}">
          <div class="chips-field">
            <div class="chips-container" id="chips-container"></div>
            <div class="chips-input-row">
              <input type="text" id="chips-input" placeholder="es. mare, conchiglia, amicizia">
              <button type="button" id="btn-aggiungi-chip">Aggiungi</button>
            </div>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" id="btn-genera">Genera</button>
          <a href="/cronologia" class="link-cronologia">Storico fiabe</a>
          <a href="/impostazioni" class="link-cronologia">Impostazioni</a>
        </div>
      </form>
    </section>
  </div>

  <script>
    // Chips
    var chips = [];
    try { chips = JSON.parse(document.getElementById('parole_chiave_json').value) || []; } catch (e) { chips = []; }

    function renderChips() {
      var container = document.getElementById('chips-container');
      container.innerHTML = '';
      chips.forEach(function (chip, i) {
        var span = document.createElement('span');
        span.className = 'chip';
        span.appendChild(document.createTextNode(chip + ' '));
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.setAttribute('aria-label', 'Rimuovi');
        btn.textContent = '×';
        btn.onclick = (function (idx) { return function () { removeChip(idx); }; })(i);
        span.appendChild(btn);
        container.appendChild(span);
      });
      document.getElementById('parole_chiave_json').value = JSON.stringify(chips);
    }

    function addChip(value) {
      value = value.trim();
      if (!value || chips.indexOf(value) !== -1) return;
      chips.push(value);
      renderChips();
      document.getElementById('chips-input').value = '';
    }

    function removeChip(index) {
      chips.splice(index, 1);
      renderChips();
    }

    document.getElementById('chips-input').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') { e.preventDefault(); addChip(this.value); }
    });
    document.getElementById('btn-aggiungi-chip').addEventListener('click', function () {
      addChip(document.getElementById('chips-input').value);
    });

    renderChips();

    // Loading overlay
    document.getElementById('genera-form').addEventListener('submit', function (e) {
      e.preventDefault();
      document.getElementById('btn-genera').disabled = true;
      document.getElementById('loading-overlay').style.display = 'flex';
      this.submit();
    });
  </script>
</body>
</html>
