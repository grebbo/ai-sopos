<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }} — AI-Sopos</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div id="reading-progress"></div>

  <nav class="reader-toolbar">
    <div style="display:flex;gap:.4rem">
      <a href="/" class="icon-btn" title="Home">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </a>
      <a href="/cronologia" class="icon-btn" title="Cronologia">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      </a>
      <a href="/impostazioni" class="icon-btn" title="Impostazioni">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </a>
    </div>
    <div class="toolbar-controls">
      <button id="btn-font-dec" class="toolbar-btn" aria-label="Riduci testo">A−</button>
      <button id="btn-font-inc" class="toolbar-btn" aria-label="Aumenta testo">A+</button>
      <button id="btn-dark" class="toolbar-btn">☀ Giorno</button>
      <button id="btn-play" class="toolbar-btn">▶ Scorri</button>
      <input id="scroll-speed" type="range" min="1" max="10" value="3" aria-label="Velocità scorrimento">
    </div>
  </nav>

  <div class="reader-container">
    <h1 class="reader-title">{{ title }}</h1>
    <div class="reader-body">{{ body }}</div>
  </div>

  <script>
    // Font size — 7 step da 14px a 26px
    var SIZES = [14, 16, 18, 20, 22, 24, 26];
    var sizeIdx = {{ reader.font_size_index }};
    var btnDec = document.getElementById('btn-font-dec');
    var btnInc = document.getElementById('btn-font-inc');
    function applyFont() {
      document.documentElement.style.setProperty('--reader-font-size', SIZES[sizeIdx] + 'px');
      btnDec.disabled = sizeIdx === 0;
      btnInc.disabled = sizeIdx === SIZES.length - 1;
    }
    btnDec.addEventListener('click', function () { sizeIdx = Math.max(0, sizeIdx - 1); applyFont(); });
    btnInc.addEventListener('click', function () { sizeIdx = Math.min(SIZES.length - 1, sizeIdx + 1); applyFont(); });
    applyFont();

    // Dark mode
    var btnDark = document.getElementById('btn-dark');
    if ({{ 'true' if reader.dark_mode else 'false' }}) {
      document.body.classList.add('dark');
      btnDark.textContent = '☾ Notte';
    }
    btnDark.addEventListener('click', function () {
      document.body.classList.toggle('dark');
      btnDark.textContent = document.body.classList.contains('dark') ? '☾ Notte' : '☀ Giorno';
    });

    // Progress bar
    var progressEl = document.getElementById('reading-progress');
    window.addEventListener('scroll', function () {
      var total = document.documentElement.scrollHeight - window.innerHeight;
      progressEl.style.width = total > 0 ? (window.scrollY / total * 100) + '%' : '0%';
    }, { passive: true });

    // Autoscroll
    var btnPlay = document.getElementById('btn-play');
    var speedInput = document.getElementById('scroll-speed');
    speedInput.value = {{ reader.scroll_speed }};
    var scrolling = false;
    var rafId = null;
    function tick() {
      if (!scrolling) return;
      window.scrollBy(0, speedInput.value * 0.3);
      if (window.scrollY + window.innerHeight >= document.documentElement.scrollHeight) {
        scrolling = false;
        btnPlay.textContent = '▶ Scorri';
        return;
      }
      rafId = requestAnimationFrame(tick);
    }
    btnPlay.addEventListener('click', function () {
      scrolling = !scrolling;
      btnPlay.textContent = scrolling ? '⏸ Pausa' : '▶ Scorri';
      if (scrolling) rafId = requestAnimationFrame(tick);
    });
    function stopScroll() {
      if (!scrolling) return;
      scrolling = false;
      btnPlay.textContent = '▶ Scorri';
      cancelAnimationFrame(rafId);
    }
    window.addEventListener('wheel', stopScroll, { passive: true });
    window.addEventListener('touchmove', stopScroll, { passive: true });
  </script>
</body>
</html>
